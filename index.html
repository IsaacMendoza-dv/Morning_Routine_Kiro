<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Routine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌅</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS modular -->
  <link rel="stylesheet" href="css/base.css?v=5">
  <link rel="stylesheet" href="css/layout.css?v=5">
  <link rel="stylesheet" href="css/widgets.css?v=5">
  <link rel="stylesheet" href="css/pending.css?v=5">
  <link rel="stylesheet" href="css/tasks.css?v=5">
  <link rel="stylesheet" href="css/mood.css?v=5">
  <link rel="stylesheet" href="css/history.css?v=5">
</head>
<body>

<canvas id="particles"></canvas>

<!-- ── Auth ── -->
<div id="authScreen">
  <h1>// morning_routine</h1>
  <div style="font-size:1.4rem;color:var(--accent);letter-spacing:0.08em">Hola Isaac 👋</div>
  <div class="auth-box">
    <label>INICIAR SESIÓN</label>
    <button class="btn-google" id="btnGoogle">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continuar con Google
    </button>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- ── App ── -->
<div class="app" id="appScreen">

  <header>
    <div class="header-left">
      <h1>// morning_routine</h1>
      <div class="date" id="dateLabel"></div>
      <!-- Agenda del día -->
      <div class="calendar-bar" style="margin-top:12px;margin-bottom:0;padding:10px 14px;max-width:340px">
        <div class="calendar-bar-label">// HOY EN TU AGENDA</div>
        <div id="calendarEvents"><span class="cal-empty">cargando...</span></div>
      </div>
    </div>
    <div class="header-right">
      <div class="countdown-block">
        <div class="countdown-label">tiempo restante → 08:00</div>
        <div class="countdown-time on-time" id="countdown">--:--:--</div>
        <div class="start-config">
          <span>inicio</span>
          <input type="time" id="startTime" value="05:30">
        </div>
      </div>
      <button class="btn-signout" id="btnSignOut">cerrar sesión</button>
    </div>
  </header>

  <!-- Clima -->
  <div class="weather-bar" id="weatherBar">
    <div class="weather-icon" id="weatherIcon">⏳</div>
    <div class="weather-msg"  id="weatherMsg">cargando pronóstico...</div>
    <div class="weather-temp" id="weatherTemp"></div>
  </div>

  <!-- Pendientes a mediano plazo -->
  <div class="pending-section">
    <div class="pending-header">
      <span>// pendientes</span>
      <button class="btn-add" onclick="addPending()">+ agregar</button>
    </div>
    <div class="pending-list" id="pendingList">
      <div style="font-size:0.65rem;color:var(--muted);padding:8px 0">cargando...</div>
    </div>
  </div>

  <!-- Mood check-in -->
  <div class="mood-bar">
    <div class="mood-label">// ¿CÓMO TE SIENTES HOY?</div>
    <div class="mood-options">
      <button class="mood-btn" data-mood="😴" data-label="cansado">😴 cansado</button>
      <button class="mood-btn" data-mood="😟" data-label="estresado">😟 estresado</button>
      <button class="mood-btn" data-mood="😢" data-label="triste">😢 triste</button>
      <button class="mood-btn" data-mood="😐" data-label="neutral">😐 neutral</button>
      <button class="mood-btn" data-mood="🙂" data-label="bien">🙂 bien</button>
      <button class="mood-btn" data-mood="⚡" data-label="con energía">⚡ con energía</button>
    </div>
    <div class="mood-saved" id="moodSaved"></div>
  </div>

  <!-- Barra de progreso -->
  <div class="progress-wrap" style="margin-top: 32px; margin-bottom: 24px;">
    <div class="progress-meta">
      <span id="progressLabel">0 / 0 tareas completadas</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Tareas del día -->
  <div class="tasks-header">
    <span>// tareas</span>
    <button class="btn-add" onclick="addTask()">+ nueva tarea</button>
  </div>
  <div class="task-list" id="taskList"></div>

  <div class="footer-info">
    <span id="totalTimeInfo"></span>
    <button class="btn-reset" onclick="resetDay()">↺ reiniciar día</button>
  </div>

  <!-- Historial -->
  <button class="history-toggle" onclick="toggleHistory()">
    <span id="historyArrow">▶</span> // historial
  </button>
  <div class="history-panel" id="historyPanel"></div>

  <!-- Métricas -->
  <button class="metrics-toggle" onclick="toggleMetrics()">
    <span id="metricsArrow">▶</span> // métricas emocionales
  </button>
  <div class="metrics-panel" id="metricsPanel"></div>

</div>

<div class="saving-indicator" id="savingIndicator">guardando...</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script defer src="js/particles.js?v=5"></script>
<script defer src="js/countdown.js?v=5"></script>
<script defer src="js/widgets.js?v=5"></script>
<script defer src="js/tasks.js?v=5"></script>
<script defer src="js/pending.js?v=5"></script>
<script defer src="js/mood.js?v=5"></script>
<script defer src="js/history.js?v=5"></script>
<script defer src="js/main.js?v=5"></script>

</body>
</html>
